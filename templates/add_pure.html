<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment - Hospital System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark p-3">
    <a class="navbar-brand text-white" href="/">Hospital System</a>
    <div class="navbar-nav ms-auto">
        <span class="navbar-text text-white me-3">Welcome, User</span>
        <a class="nav-link text-white" href="/dashboard">Dashboard</a>
        <a class="nav-link text-white" href="/auth/logout">Logout</a>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">
                            <i class="fas fa-calendar-plus me-2"></i>Schedule New Appointment
                        </h4>
                        <button onclick="goBack()" class="btn btn-outline-secondary btn-sm">
                            <i class="fas fa-arrow-left me-1"></i> Back
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Alert Messages -->
                    <div id="alert-container"></div>

                    <form id="appointmentForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="patient_name" class="form-label">Patient Name *</label>
                                <select class="form-select" id="patient_name" name="patient_name" required>
                                    <option value="">Select a patient</option>
                                    <option value="John Doe">John Doe (35y)</option>
                                    <option value="Jane Smith">Jane Smith (42y)</option>
                                    <option value="Bob Wilson">Bob Wilson (28y)</option>
                                    <option value="Alice Davis">Alice Davis (55y)</option>
                                    <option value="Charlie Brown">Charlie Brown (67y)</option>
                                </select>
                                <div class="form-text">Select from existing patients</div>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="doctor_name" class="form-label">Doctor Name *</label>
                                <input type="text" class="form-control" id="doctor_name" name="doctor_name" 
                                       placeholder="Dr. Smith" required>
                                <div class="form-text">Enter the doctor's full name</div>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="date" class="form-label">Appointment Date *</label>
                                <input type="datetime-local" class="form-control" id="date" name="date" required>
                                <div class="form-text">Select date and time for appointment</div>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="scheduled" selected>Scheduled</option>
                                    <option value="in-progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                                <div class="form-text">Initial appointment status</div>
                            </div>
                            
                            <div class="col-12">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea class="form-control" id="notes" name="notes" rows="4" 
                                          placeholder="Add any additional notes about this appointment..."></textarea>
                                <div class="form-text">Optional notes about the appointment</div>
                            </div>
                            
                            <div class="col-12">
                                <div class="d-flex justify-content-between">
                                    <button type="button" onclick="goBack()" class="btn btn-secondary">
                                        <i class="fas fa-times me-1"></i> Cancel
                                    </button>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i> Schedule Appointment
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Form validation and submission
function initializeForm() {
    // Set minimum date to today
    const dateInput = document.getElementById('date');
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    dateInput.min = `${year}-${month}-${day}T${hours}:${minutes}`;
    
    // Add form submit handler
    document.getElementById('appointmentForm').addEventListener('submit', handleSubmit);
}

function handleSubmit(e) {
    e.preventDefault();
    
    // Get form data
    const formData = {
        patient_name: document.getElementById('patient_name').value,
        doctor_name: document.getElementById('doctor_name').value,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
    };
    
    // Validate form
    if (!validateForm(formData)) {
        return;
    }
    
    // Submit appointment (mock implementation)
    submitAppointment(formData);
}

function validateForm(data) {
    // Clear previous alerts
    clearAlerts();
    
    let isValid = true;
    let errors = [];
    
    // Validate patient name
    if (!data.patient_name) {
        errors.push('Please select a patient');
        isValid = false;
    }
    
    // Validate doctor name
    if (!data.doctor_name || data.doctor_name.trim().length < 2) {
        errors.push('Please enter a valid doctor name');
        isValid = false;
    }
    
    // Validate date
    if (!data.date) {
        errors.push('Please select an appointment date and time');
        isValid = false;
    } else {
        const appointmentDate = new Date(data.date);
        const now = new Date();
        if (appointmentDate <= now) {
            errors.push('Appointment date must be in the future');
            isValid = false;
        }
    }
    
    // Show errors if any
    if (!isValid) {
        showAlert(errors.join('<br>'), 'danger');
    }
    
    return isValid;
}

function submitAppointment(data) {
    // Mock API call
    console.log('Submitting appointment:', data);
    
    // Simulate API call delay
    setTimeout(() => {
        showAlert('Appointment scheduled successfully!', 'success');
        
        // Reset form after successful submission
        setTimeout(() => {
            document.getElementById('appointmentForm').reset();
            goBack();
        }, 2000);
    }, 1000);
}

function showAlert(message, type = 'info') {
    const alertContainer = document.getElementById('alert-container');
    const alertId = 'alert-' + Date.now();
    
    const alertHTML = `
        <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
    
    alertContainer.innerHTML = alertHTML;
    
    // Auto-dismiss success alerts after 5 seconds
    if (type === 'success') {
        setTimeout(() => {
            const alertElement = document.getElementById(alertId);
            if (alertElement) {
                const bsAlert = new bootstrap.Alert(alertElement);
                bsAlert.close();
            }
        }, 5000);
    }
}

function clearAlerts() {
    document.getElementById('alert-container').innerHTML = '';
}

function goBack() {
    window.location.href = '/appointments';
}

// Auto-save draft functionality
let autoSaveTimer;
function setupAutoSave() {
    const form = document.getElementById('appointmentForm');
    const inputs = form.querySelectorAll('input, select, textarea');
    
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                saveDraft();
            }, 2000); // Save 2 seconds after user stops typing
        });
    });
}

function saveDraft() {
    const formData = {
        patient_name: document.getElementById('patient_name').value,
        doctor_name: document.getElementById('doctor_name').value,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
    };
    
    // Save to localStorage
    localStorage.setItem('appointmentDraft', JSON.stringify(formData));
    console.log('Draft saved');
}

function loadDraft() {
    const draft = localStorage.getItem('appointmentDraft');
    if (draft) {
        const formData = JSON.parse(draft);
        document.getElementById('patient_name').value = formData.patient_name || '';
        document.getElementById('doctor_name').value = formData.doctor_name || '';
        document.getElementById('date').value = formData.date || '';
        document.getElementById('status').value = formData.status || 'scheduled';
        document.getElementById('notes').value = formData.notes || '';
        
        console.log('Draft loaded');
    }
}

function clearDraft() {
    localStorage.removeItem('appointmentDraft');
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    initializeForm();
    setupAutoSave();
    loadDraft();
    
    // Clear draft on successful submission
    const originalSubmit = submitAppointment;
    submitAppointment = function(data) {
        originalSubmit(data);
        clearDraft();
    };
});

// Clear draft when leaving the page
window.addEventListener('beforeunload', function() {
    const form = document.getElementById('appointmentForm');
    const hasData = Array.from(form.elements).some(element => element.value);
    
    if (hasData) {
        saveDraft();
    }
});
</script>

<style>
.card {
    border: none;
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
}

.card-header {
    background-color: #fff;
    border-bottom: 1px solid #dee2e6;
}

.form-control:focus {
    border-color: #86b7fe;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}

.form-select:focus {
    border-color: #86b7fe;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}

.btn {
    border-radius: 0.375rem;
}

.alert {
    border: none;
    border-radius: 0.375rem;
}

.alert-success {
    background-color: #d1e7dd;
    color: #0f5132;
}

.alert-danger {
    background-color: #f8d7da;
    color: #842029;
}

.form-text {
    font-size: 0.875rem;
    color: #6c757d;
}
</style>
</body>
</html>
